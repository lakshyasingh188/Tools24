<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tools24 | PDF Compressor</title>
    <link rel="stylesheet" href="compress-pdf.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="container">
        <header>
            <h1>Compress PDF Files</h1>
            <p>High-performance compression with a modern glassmorphic interface.</p>
        </header>

        <div class="glass-card">
            <div class="options-bar">
                <div class="slider-group">
                    <label>Compression Level: <span id="rangeValue">50</span>%</label>
                    <input type="range" id="compRange" min="10" max="100" value="50" class="glass-slider">
                    <div class="slider-labels">
                        <span>High Compression (Small File)</span>
                        <span>Low Compression (Best Quality)</span>
                    </div>
                </div>
            </div>

            <div class="drop-zone" id="dropZone">
                <div class="icon-wrapper" id="statusIcon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M11 20V7.825L5.425 13.4L4 12L12 4L20 12L18.575 13.4L13 7.825V20H11Z"/>
                    </svg>
                </div>
                <h3 id="mainText">Choose a PDF file</h3>
                <p id="subText">or drag and drop it here</p>
                <input type="file" id="fileInput" accept="application/pdf" hidden>
                <button class="btn-primary" id="actionBtn">Select File</button>
            </div>

            <div class="progress-wrapper" id="progressWrapper" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-data">
                    <span id="percentText">0%</span>
                    <span id="statusLabel">Optimizing PDF...</span>
                </div>
            </div>

            <div id="downloadIndicator" class="indicator-msg"></div>
        </div>
    </main>

    <script src="compress-pdf.js"></script>
</body>
</html>
