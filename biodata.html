<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Biodata Builder</title>

<link rel="stylesheet" href="biodata.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="https://unpkg.com/@phosphor-icons/web"></script>

</head>

<body>

<div class="app-container">

<header class="app-header">

<div>
<h1>Biodata Builder</h1>
<p>Create professional marriage biodata in minutes</p>
</div>

<div class="header-actions">

<div class="template-selector">
<label for="template-select"><i class="ph ph-palette"></i> Template:</label>

<select id="template-select">
<option value="template-modern-minimal" selected>Modern Minimalist</option>
<option value="template-professional-elegant">Professional Elegant</option>
<option value="template-creative-accent">Creative Accent</option>
<option value="template-tech-sleek">Tech Sleek</option>
<option value="template-executive-split">Executive Split</option>
</select>

</div>

<div class="color-picker-wrapper">
<label for="theme-color"><i class="ph ph-drop"></i> Accent:</label>
<input type="color" id="theme-color" value="#4f46e5">
</div>

<button id="download-btn" class="btn-primary">
<i class="ph ph-download-simple"></i> Download PDF
</button>

</div>

</header>


<div class="workspace">


<!-- LEFT FORM PANEL -->

<section class="editor-panel scrollable-panel">

<form id="resume-form">


<!-- PHOTO UPLOAD -->

<div class="form-section glass-panel">

<h2 class="section-title"><i class="ph ph-image"></i> Profile Photo / प्रोफाइल फोटो</h2>

<div class="input-group">
<label>Upload Photo / फोटो अपलोड करें</label>
<input type="file" id="photoUpload" accept="image/*">
</div>

</div>


<!-- BASIC INFO -->

<div class="form-section glass-panel">

<h2 class="section-title"><i class="ph ph-user"></i> Basic Information / मूल जानकारी</h2>

<div class="input-grid">

<div class="input-group">
<label>Full Name / पूरा नाम</label>
<input type="text" id="fullName">
</div>

<div class="input-group">
<label>Birth Date & Time / जन्म तिथि व समय</label>
<input type="text" id="birthdatetime">
</div>

<div class="input-group">
<label>Birthplace / जन्म स्थान</label>
<input type="text" id="birthplace">
</div>

<div class="input-group">
<label>Height / लंबाई</label>
<input type="text" id="height">
</div>

<div class="input-group">
<label>Hobbies / शौक</label>
<input type="text" id="hobbies">
</div>

<div class="input-group">
<label>Education / शिक्षा</label>
<input type="text" id="education">
</div>

<div class="input-group">
<label>Language Known / भाषाएँ</label>
<input type="text" id="language">
</div>

<div class="input-group">
<label>Occupation / पेशा</label>
<input type="text" id="occupation">
</div>

<div class="input-group">
<label>Marital Status / वैवाहिक स्थिति</label>
<input type="text" id="marital">
</div>

</div>

</div>


<!-- HOROSCOPE -->

<div class="form-section glass-panel">

<h2 class="section-title"><i class="ph ph-star"></i> Horoscope / कुंडली</h2>

<div class="input-grid">

<div class="input-group">
<label>Gotra / गोत्र</label>
<input type="text" id="gotra">
</div>

<div class="input-group">
<label>Gan / गण</label>
<input type="text" id="gan">
</div>

<div class="input-group">
<label>Caste / जाति</label>
<input type="text" id="cast">
</div>

</div>

</div>


<!-- FAMILY BACKGROUND -->

<div class="form-section glass-panel">

<h2 class="section-title"><i class="ph ph-users"></i> Family Background / पारिवारिक विवरण</h2>

<div class="input-grid">

<div class="input-group">
<label>Father Name / पिता का नाम</label>
<input type="text" id="father">
</div>

<div class="input-group">
<label>Mother Name / माता का नाम</label>
<input type="text" id="mother">
</div>

<div class="input-group">
<label>Grand Father Name / दादा का नाम</label>
<input type="text" id="grandfather">
</div>

<div class="input-group">
<label>Brother / भाई</label>
<input type="text" id="brother">
</div>

<div class="input-group">
<label>Sister / बहन</label>
<input type="text" id="sister">
</div>

<div class="input-group">
<label>Mama / मामा</label>
<input type="text" id="mama">
</div>

</div>

</div>


<!-- CONTACT -->

<div class="form-section glass-panel">

<h2 class="section-title"><i class="ph ph-phone"></i> Contact / संपर्क</h2>

<div class="input-grid">

<div class="input-group">
<label>Contact No / मोबाइल नंबर</label>
<input type="text" id="contact">
</div>

<div class="input-group">
<label>WhatsApp / व्हाट्सएप</label>
<input type="text" id="whatsapp">
</div>

<div class="input-group">
<label>Address / पता</label>
<input type="text" id="address">
</div>

</div>

</div>

</form>

</section>


<!-- PREVIEW PANEL -->

<section class="preview-panel">

<div class="preview-container">

<div id="resume-document" class="template-modern-minimal">

<div style="text-align:center;margin-bottom:20px">

<img id="previewPhoto" src="" style="width:130px;height:130px;border-radius:50%;object-fit:cover;border:3px solid #444">

</div>

<!-- JS will inject biodata preview -->

</div>

</div>

</section>

</div>

</div>

<script src="biodata.js"></script>

</body>
</html>
