<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools24 Typing Test</title>
    <link rel="stylesheet" href="typping.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-glow"></div>
    <nav class="nav-bar">
        <button class="back-btn" onclick="window.history.back()">← Back</button>
    </nav>

    <main class="app-container">
        <header class="hero">
            <h1>Tools24 Typing Test</h1>
        </header>

        <!-- Time Selector -->
        <div class="mode-selector">
            <button class="mode-btn" data-time="30">30s</button>
            <button class="mode-btn active" data-time="60">60s (1m)</button>
            <button class="mode-btn" data-time="120">120s (2m)</button>
        </div>

        <div class="stats-bar glass">
            <div class="stat-item"><span class="label">Time Left</span><span class="value" id="timer">60s</span></div>
            <div class="stat-item"><span class="label">WPM</span><span class="value" id="wpm">0</span></div>
            <div class="stat-item"><span class="label">Accuracy</span><span class="value" id="accuracy">100%</span>
            </div>
        </div>

        <div class="typing-box glass" id="typing-area">
            <div id="caret" class="caret"></div>
            <div class="text-display" id="text-display"></div>
            <input type="text" id="hidden-input" class="hidden-input" autofocus autocomplete="off">
        </div>

        <div class="controls">
            <button id="restart-btn" class="main-btn secondary">Restart Test</button>
        </div>
    </main>

    <div id="result-modal" class="modal">
        <div class="modal-content glass">
            <h2>Test Results</h2>
            <div class="result-grid">
                <div class="res-card"><span class="res-val" id="final-wpm">0</span><span class="res-lab">WPM</span>
                </div>
                <div class="res-card"><span class="res-val" id="final-accuracy">0%</span><span
                        class="res-lab">Accuracy</span></div>
            </div>
            <button class="main-btn" onclick="resetTest()">Try Again</button>
        </div>
    </div>

    <script src="typping.js"></script>
</body>

</html>
