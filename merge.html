<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools24 Merge Files | PDF & Images</title>
  <link rel="stylesheet" href="merge.css">
  <!-- Required Library for merging everything in the browser -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>

<body>

  <div class="glow-canvas"></div>

  <nav class="nav-container">
    <button class="back-link" onclick="location.reload()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6" />
      </svg>
      Back
    </button>
  </nav>

  <main class="wrapper">
    <header class="app-header">
      <h1>Tools24 Merge Files</h1>
      <p>Combine your PDFs, JPGs, and PNGs into one single document</p>
    </header>

    <div class="glass-container">
      <div id="slots-list" class="slots-list">
        <!-- 10 line-by-line slots generated by script.js -->
      </div>

      <div class="footer-actions">
        <button id="process-btn" class="merge-trigger" disabled>
          <span id="btn-text">Merge All Files</span>
        </button>
        <p id="status-feedback" class="status-feedback"></p>
      </div>
    </div>
  </main>

  <!-- Full Screen Loading System -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loader-box">
      <div class="loading-ring"></div>
      <h2>Processing Files</h2>
      <p>Converting images and merging PDFs... please wait.</p>
    </div>
  </div>

  <script src="merge.js"></script>
</body>

</html>
